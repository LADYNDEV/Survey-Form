<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Tantan Wings Tech Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 id="title">Tantan Wings Tech Application</h1>
    <p id="description">Apply now to join the youth tech program in Tan-Tan city! Fill out the information below.</p>
    <form id="survey-form">
        <label id="name-label" for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required >
        <label id="email-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required >
        <label id="number-label" for="number">Phone Number</label>
        <input type="number" id="number" name="phone" min="600000000" max="799999999" placeholder="Enter mobile number" >
        <label for="dropdown">Current Education Level</label>
        <select id="dropdown" name="education">
            <option value="">Select one...</option>
            <option value="highschool">High School</option>
            <option value="university">University</option>
            <option value="other">Other</option></select>
            <p>Which track are you applying for?</p><label>
                <input type="radio" name="track" value="development"> Development</label>
                <label>
                    <input type="radio" name="track" value="data&development"> Data & Development</label>
                    <label>
                        <input type="radio" name="track" value="cybercecurity"> Cybercecurity</label>
                        <p>What skills do you have?</p>
                        <label>
                            <input type="checkbox" value="html"> HTML</label>
                            <label>
                                <input type="checkbox" value="css"> CSS</label>
                                <label>
                                    <input type="checkbox" value="js"> JavaScript</label>
                                    <label>
                                        <input type="checkbox" value="other_skills"> Other Skills
                                         </label>
                                         <label for="comments">Why do you want to join Tantan Wings Tech?</label>
                                         <textarea id="comments" rows="4" placeholder="Tell us your motivation..."></textarea>
                                         <button type="submit" id="submit">Submit Application</button>
                                        </form>
                                    </body>
                                    </html>
